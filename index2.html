<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>English File Intermediate - Аудио плеер + PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f2f5f9;
            color: #1e2a3e;
            padding: 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* компактный хедер */
        .header {
            margin-bottom: 1rem;
            text-align: center;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e3c72, #2b4c7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header p {
            color: #4a627a;
            margin-top: 0.2rem;
            font-size: 0.8rem;
        }

        /* PDF ссылки - компактные */
        .pdf-links {
            background: white;
            border-radius: 16px;
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            border: 1px solid #e2edf7;
        }

        .pdf-card {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            text-decoration: none;
            color: #1e2a3e;
            border: 1px solid #dce5ef;
            font-size: 0.8rem;
        }

        .pdf-card:hover {
            background: #eef2ff;
            border-color: #3b82f6;
        }

        .pdf-icon {
            font-size: 1.2rem;
        }

        .pdf-title {
            font-weight: 600;
            font-size: 0.8rem;
        }

        .btn-pdf {
            background: #eef2ff;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            color: #1e40af;
            margin-left: 6px;
        }

        /* статистика и поиск - компактно */
        .stats {
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            margin-top: 0.4rem;
        }

        .search-bar {
            margin-bottom: 0.8rem;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            border: 1px solid #cfdfed;
            border-radius: 40px;
            background: white;
        }

        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        /* список - максимально компактный */
        .files-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .audio-item {
            background: white;
            border-radius: 12px;
            padding: 0.6rem 0.9rem;
            border: 1px solid #e9edf2;
            transition: all 0.1s;
        }

        .audio-item:hover {
            border-color: #cbdde9;
            background: #fefefe;
        }

        .file-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .file-name {
            flex: 2;
            min-width: 160px;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: monospace;
            color: #0f2b3d;
            word-break: break-all;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .file-icon {
            font-size: 0.9rem;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            border: none;
            background: #f0f4f9;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-play {
            background: #eef2ff;
            color: #1e40af;
        }

        .btn-play:hover {
            background: #d9e4ff;
        }

        .btn-download {
            background: #e9f4ef;
            color: #2b6e3c;
        }

        .btn-active {
            background: #1e40af;
            color: white;
        }

        /* прогресс-бар компактный */
        .progress-section {
            margin-top: 6px;
            padding-top: 4px;
            border-top: 1px solid #edf2f7;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-info {
            font-size: 0.65rem;
            font-family: monospace;
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 16px;
            min-width: 85px;
            text-align: center;
        }

        .progress-bar-container {
            flex: 3;
            min-width: 100px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #3b82f6;
            border-radius: 4px;
        }

        .progress-bar-container:hover {
            height: 5px;
        }

        @media (max-width: 700px) {
            body {
                padding: 0.7rem;
            }
            .file-row {
                flex-direction: column;
                align-items: stretch;
            }
            .actions {
                justify-content: flex-start;
            }
            .progress-section {
                flex-direction: column;
                align-items: stretch;
            }
            .time-info {
                align-self: flex-start;
            }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            font-size: 0.85rem;
        }

        footer {
            margin-bottom: 10px;
        }
    </style>
</head>

        "English_File_4e_Intermediate_WB_9.2.mp3","English_File_4e_Intermediate_WB_9.3.mp3","English_File_4e_Intermediate_WB_10.1.mp3",
        "English_File_4e_Intermediate_WB_10.2.mp3"
    ];

    // Объединяем и сортируем по имени
    let allFiles = [...sbFiles, ...wbFiles];
    allFiles.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
    
    // Глобальное состояние аудио
    let currentAudio = null;
    let currentFileSrc = null;
    let activeItemId = null;
    let progressInterval = null;
    
    const filesListEl = document.getElementById('filesList');
    const searchInput = document.getElementById('searchInput');
    const fileStatsSpan = document.getElementById('fileStats');

    function formatTime(seconds) {
        if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function updateProgressForActive() {
        if (!activeItemId || !currentAudio) return;
        const progressFill = document.querySelector(`.progress-fill[data-progress-for="${activeItemId}"]`);
        const currentTimeSpan = document.querySelector(`.current-time[data-time-for="${activeItemId}"]`);
        const durationSpan = document.querySelector(`.duration[data-dur-for="${activeItemId}"]`);
        if (progressFill && currentTimeSpan) {
            if (!isNaN(currentAudio.duration) && isFinite(currentAudio.duration) && currentAudio.duration > 0) {
                const percent = (currentAudio.currentTime / currentAudio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.textContent = formatTime(currentAudio.currentTime);
                if (durationSpan && (durationSpan.textContent === "0:00" || durationSpan.textContent === "0:00") && currentAudio.duration) {
                    durationSpan.textContent = formatTime(currentAudio.duration);
                }
            } else {
                progressFill.style.width = "0%";
                currentTimeSpan.textContent = "0:00";
            }
        }
    }
    
    function startProgressUpdater() {
        if (progressInterval) clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (currentAudio && activeItemId) {
                updateProgressForActive();
            }
        }, 200);
    }
    
    function stopCurrentAudio(resetButtonState = true) {
        if (progressInterval) clearInterval(progressInterval);
        progressInterval = null;
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
        if (resetButtonState && activeItemId) {
            const prevBtn = document.querySelector(`.btn-play[data-file="${activeItemId}"]`);
            if (prevBtn) {
                prevBtn.innerHTML = '▶️';
                prevBtn.classList.remove('btn-active');
            }
            const progressFill = document.querySelector(`.progress-fill[data-progress-for="${activeItemId}"]`);
            const currentSpan = document.querySelector(`.current-time[data-time-for="${activeItemId}"]`);
            if (progressFill) progressFill.style.width = "0%";
            if (currentSpan) currentSpan.textContent = "0:00";
        }
        currentFileSrc = null;
        activeItemId = null;
    }
    
    function pauseCurrentAudio() {
        if (currentAudio && !currentAudio.paused) {
            currentAudio.pause();
            if (activeItemId) {
                const activeBtn = document.querySelector(`.btn-play[data-file="${activeItemId}"]`);
                if (activeBtn) {
                    activeBtn.innerHTML = '▶️';
                    activeBtn.classList.remove('btn-active');
                }
            }
        }
    }
    
    function playFile(fileName, buttonElement) {
        if (currentAudio && currentFileSrc === fileName && !currentAudio.paused) {
            pauseCurrentAudio();
            return;
        }
        if (currentAudio && currentFileSrc === fileName && currentAudio.paused) {
            currentAudio.play().catch(e => console.warn("play error", e));
            buttonElement.innerHTML = '⏸️';
            buttonElement.classList.add('btn-active');
            startProgressUpdater();
            return;
        }
        
        stopCurrentAudio(true);
        
        const audio = new Audio(fileName);
        currentAudio = audio;
        currentFileSrc = fileName;
        activeItemId = fileName;
        
        const progressFill = document.querySelector(`.progress-fill[data-progress-for="${fileName}"]`);
        const currentSpan = document.querySelector(`.current-time[data-time-for="${fileName}"]`);
        if (progressFill) progressFill.style.width = "0%";
        if (currentSpan) currentSpan.textContent = "0:00";
        
        audio.addEventListener('loadedmetadata', () => {
            if (activeItemId === fileName) updateProgressForActive();
        });
        audio.addEventListener('timeupdate', () => { if (activeItemId === fileName) updateProgressForActive(); });
        audio.play().catch(err => { alert(`Ошибка: ${fileName}\nФайл не найден.`); stopCurrentAudio(true); });
        audio.addEventListener('ended', () => { if (activeItemId === fileName) stopCurrentAudio(true); });
        
        buttonElement.innerHTML = '⏸️';
        buttonElement.classList.add('btn-active');
        startProgressUpdater();
    }
    
    function downloadFile(fileName) {
        const link = document.createElement('a');
        link.href = fileName;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    
    function seekTo(event, fileName) {
        if (!currentAudio || activeItemId !== fileName) return;
        const container = event.currentTarget;
        const rect = container.getBoundingClientRect();
        const clickX = event.clientX - rect.left;
        const width = rect.width;
        const percent = Math.min(1, Math.max(0, clickX / width));
        if (currentAudio.duration && isFinite(currentAudio.duration) && currentAudio.duration > 0) {
            currentAudio.currentTime = percent * currentAudio.duration;
            updateProgressForActive();
        }
    }
    
    function renderFileList(filterText = '') {
        const lowerFilter = filterText.toLowerCase();
        const filtered = allFiles.filter(file => file.toLowerCase().includes(lowerFilter));
        fileStatsSpan.innerHTML = `🎧 ${allFiles.length} треков | показано ${filtered.length}`;
        
        if (filtered.length === 0) {
            filesListEl.innerHTML = `<div class="empty-state">🎧 Ничего не найдено</div>`;
            return;
        }
        
        filesListEl.innerHTML = filtered.map(file => {
            const displayName = file.replace(/\.mp3$/i, '');
            const isActivePlaying = (currentFileSrc === file && currentAudio && !currentAudio.paused);
            const playBtnText = isActivePlaying ? '⏸️' : '▶️';
            const activeClass = isActivePlaying ? 'btn-active' : '';
            let currentTimeVal = "0:00";
            let durationVal = "0:00";
            if (currentFileSrc === file && currentAudio) {
                if (!isNaN(currentAudio.currentTime)) currentTimeVal = formatTime(currentAudio.currentTime);
                if (currentAudio.duration && !isNaN(currentAudio.duration)) durationVal = formatTime(currentAudio.duration);
            }
            const progressPercent = (currentFileSrc === file && currentAudio && currentAudio.duration && currentAudio.duration > 0) 
                ? (currentAudio.currentTime / currentAudio.duration) * 100 : 0;
            return `
                <div class="audio-item" data-filename="${file}">
                    <div class="file-row">
                        <div class="file-name"><span class="file-icon">🎵</span><span title="${displayName}">${displayName}</span></div>
                        <div class="actions">
                            <button class="btn btn-play ${activeClass}" data-file="${file}">${playBtnText}</button>
                            <button class="btn btn-download" data-download="${file}">⬇️</button>
                        </div>
                    </div>
                    <div class="progress-section">
                        <div class="time-info"><span class="current-time" data-time-for="${file}">${currentTimeVal}</span> / <span class="duration" data-dur-for="${file}">${durationVal}</span></div>
                        <div class="progress-bar-container" data-seek="${file}"><div class="progress-fill" data-progress-for="${file}" style="width: ${progressPercent}%;"></div></div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.btn-play').forEach(btn => { 
            const file = btn.getAttribute('data-file'); 
            btn.addEventListener('click', (e) => { e.stopPropagation(); playFile(file, btn); }); 
        });
        document.querySelectorAll('.btn-download').forEach(btn => { 
            const file = btn.getAttribute('data-download'); 
            btn.addEventListener('click', (e) => { e.stopPropagation(); downloadFile(file); }); 
        });
        document.querySelectorAll('.progress-bar-container').forEach(container => { 
            const file = container.getAttribute('data-seek'); 
            container.addEventListener('click', (e) => { e.stopPropagation(); seekTo(e, file); }); 
        });
    }
    
    function escapeHtml(str) { 
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
    }
    
    renderFileList('');
    searchInput.addEventListener('input', (e) => renderFileList(e.target.value));
</script>
</body>
</html>
